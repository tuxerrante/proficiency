openapi: "3.0.0"
info:
  title: Petstore API
  version: "1.0.0"
  description: A sample API for testing proficiency

servers:
  - url: http://localhost:6060

paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 10
      responses:
        "200":
          description: A list of pets
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                tag:
                  type: string
      responses:
        "201":
          description: Pet created

  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: integer
          example: 123
    get:
      operationId: getPet
      summary: Get a pet by ID
      tags:
        - pets
      responses:
        "200":
          description: A pet
        "404":
          description: Pet not found
    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - pets
      responses:
        "204":
          description: Pet deleted

  /pets/{petId}/photos:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: listPetPhotos
      summary: List photos for a pet
      tags:
        - photos
      responses:
        "200":
          description: List of photo URLs

  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      tags:
        - system
      responses:
        "200":
          description: Service is healthy
